services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file:
      - ./.env

  nginx:
    build:
      context: ./nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - static_volume:/app/staticfiles
    depends_on:
    - web

  db:
    image: postgres:16
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - ./.env
    expose:
      - "5432"

  redis:
    image: redis:7
    volumes:
      - redis_data:/data
    env_file:
       - ./.env

  celery:
    build: .
    command: >
      bash -c "/usr/local/bin/celery -A config worker --loglevel=info --pool=solo"

    volumes:
      - .:/app
    env_file:
      - ./.env
    depends_on:
      - redis
      - db

  celery-beat:
    build: .
    container_name: celery-beat
    entrypoint: celery
    command: -A celery_app.celery beat --loglevel=info
    volumes:
      - .:/var/www/app/beat
    links:
      - celery
      - redis
    depends_on:
      - celery
      - redis



volumes:
  postgres_data:
  static_volume:
  redis_data: